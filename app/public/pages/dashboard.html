<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/img/scrum_icon.png">
    <link rel="stylesheet" href="../assets/css/pages/dashboard.css">
    <title>ScrumFlow | Dashboard</title>
</head>

<body>

    <div class="blob-esquerda"></div>
    <div class="blob-direita"></div>

    <!-- Conteúdo injetado pelo navbar.js -->
    <nav class="navbar" id="navbar"></nav>

    <div class="dashboard-wrapper">

        <!-- SIDEBAR: apenas links que têm página de destino real -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <a href="modulos.html" class="sidebar-link sidebar-link--ativo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        viewBox="0 0 16 16">
                        <path
                            d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2m3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2" />
                    </svg>
                    Módulos
                </a>
                <a href="historicoquestoes.html" class="sidebar-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        viewBox="0 0 16 16">
                        <path d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71z" />
                        <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16m7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0" />
                    </svg>
                    Histórico
                </a>
                <a href="configuracoes.html" class="sidebar-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        viewBox="0 0 16 16">
                        <path
                            d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492M5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0" />
                        <path
                            d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.892 3.433-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.474l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115z" />
                    </svg>
                    Config.
                </a>
            </nav>
        </aside>

        <!-- CONTEÚDO PRINCIPAL -->
        <main class="dashboard-main">

            <div class="dashboard-header">
                <p class="dashboard-subtitulo">Acompanhe seu progresso na jornada Scrum</p>
            </div>

            <div class="dashboard-layout">

                <!-- COLUNA CENTRAL: cards de módulo gerados pelo dashboard.js -->
                <div class="dashboard-centro">
                    <h2 class="secao-titulo">Seus Módulos</h2>
                    <!-- #niveis-lista é preenchido dinamicamente via GET /api/questoes/modulos -->
                    <div class="niveis-lista" id="niveis-lista"></div>
                </div>

                <!-- COLUNA LATERAL: histórico + certificado -->
                <aside class="dashboard-lateral">

                    <!-- Histórico de Tentativas -->
                    <div class="lateral-card">
                        <div class="lateral-card-topo">
                            <a href="historicoquestoes.html" class="lateral-titulo lateral-titulo--link">Histórico de
                                Tentativas</a>
                            <a href="historicoquestoes.html" class="historico-ver-todas">Ver todas</a>
                        </div>
                        <table class="historico-tabela">
                            <thead>
                                <tr>
                                    <th>Módulo</th>
                                    <th>Data</th>
                                    <th>Pontuação</th>
                                </tr>
                            </thead>
                            <!-- #historico-corpo é preenchido via GET /api/questoes/modulos-respondidos -->
                            <tbody id="historico-corpo"></tbody>
                        </table>
                    </div>

                    <!-- Certificado: cadeado e progresso atualizados pelo dashboard.js -->
                    <div class="lateral-card lateral-card--certificado">
                        <h3 class="lateral-titulo">Seu Certificado</h3>
                        <div class="certificado-icone">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none"
                                viewBox="0 0 48 48">
                                <rect width="36" height="28" x="6" y="10" rx="4" fill="#1e3a5f" stroke="#2a5a9f"
                                    stroke-width="1.5" />
                                <rect width="36" height="28" x="8" y="12" rx="4" fill="#1a3352" stroke="#2a5a9f"
                                    stroke-width="1" />
                                <circle cx="20" cy="22" r="5" fill="#f5a623" opacity="0.9" />
                                <rect x="28" y="18" width="10" height="2" rx="1" fill="#4a7ab5" opacity="0.7" />
                                <rect x="28" y="22" width="8" height="2" rx="1" fill="#4a7ab5" opacity="0.5" />
                                <rect x="28" y="26" width="6" height="2" rx="1" fill="#4a7ab5" opacity="0.4" />
                                <circle cx="37" cy="34" r="6" fill="#1e3a5f" stroke="#f5a623" stroke-width="1.5" />
                                <path d="M34 34l2 2 4-4" stroke="#f5a623" stroke-width="1.5" stroke-linecap="round"
                                    stroke-linejoin="round" />
                            </svg>
                        </div>
                        <div class="certificado-lock">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor"
                                viewBox="0 0 16 16">
                                <path
                                    d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2m3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2" />
                            </svg>
                        </div>
                        <p class="certificado-descricao">
                            Complete todos os módulos com média ≥ 7,0 para desbloquear seu certificado.
                        </p>
                        <!-- #cert-progresso é atualizado após carregar /api/questoes/modulos -->
                        <span class="certificado-progresso" id="cert-progresso"></span>
                    </div>

                </aside>

            </div>
        </main>
    </div>

    <!-- Footer -->
    <script src="../assets/js/footer.js"></script>
<script src="../assets/js/stars.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/navbar.js"></script>
    <script src="../assets/js/dashboard.js"></script>

</body>

</html>
