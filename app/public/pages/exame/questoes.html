<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="../../assets/img/scrum_icon.png" />
  <link rel="stylesheet" href="../../assets/css/pages/questoes.css" />
  <title>ScrumFlow | Questões</title>
</head>

<body>
  <div class="blob-esquerda"></div>
  <div class="blob-direita"></div>

  <!-- Conteúdo injetado pelo navbar.js -->
  <nav class="navbar" id="navbar"></nav>

  <main class="questoes-container">
    <header class="questoes-header">
      <div class="header-content">
        <button class="btn-voltar" id="btn-voltar">
          ← Voltar ao Material
        </button>
        <div class="header-info">
          <span class="nivel-info" id="nivel-info">Módulo 1 - Introdução ao Scrum</span>
          <span class="tentativa-info" id="tentativa-info">Tentativa 1/2</span>
        </div>
      </div>
    </header>

    <section class="questoes-section">
      <div class="questao-card">
        <div class="questao-numero">
          <span id="questao-numero">Questão 1</span>
        </div>

        <div class="questao-conteudo">
          <h2 class="questao-titulo" id="questao-titulo"></h2>
          <img class="questao-imagem" id="questao-imagem" src="" alt="Imagem da questão">
          <p class="questao-descricao" id="questao-descricao">
            Escolha a alternativa correta:
          </p>
        </div>

        <div class="questao-opcoes"></div>
        <span id="questao-ref" class="questao-ref"></span>
      </div>

      <div class="progresso-container">
        <div class="progresso-dots" id="progresso-dots"></div>
      </div>

      <p id="aviso-selecao" class="aviso-selecao" hidden>
        Selecione uma alternativa para avançar.
      </p>

      <div class="navegacao-controls">
        <button class="btn btn-ghost" id="btn-anterior" disabled>
          ← Anterior
        </button>

        <button class="btn btn-primary" id="btn-proxima">
          Próxima →
        </button>
      </div>
    </section>
  </main>

  <!-- Modal de confirmação: usado para finalizar prova e para sair -->
  <div class="modal-overlay" id="modal-confirmacao" style="display: none">
    <div class="modal-content">
      <h3 id="modal-titulo">Confirmar</h3>
      <p id="modal-mensagem"></p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="btn-cancelar-modal">
          Cancelar
        </button>
        <button class="btn btn-primary" id="btn-confirmar-modal">
          Confirmar
        </button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <script src="../../assets/js/footer.js"></script>
<script src="../../assets/js/stars.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/navbar.js"></script>
  <script src="../../assets/js/questoes.js"></script>
</body>
</html>
